<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NoteKeeper</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<script src="index.js"></script>
<link rel="stylesheet" href="index.css">
</head>
<body>

<header>
<h1>NoteKeeper</h1>
<p>// your personal notes, always within reach</p>
</header>

<div class="layout">

<div>
<div class="panel">
<h2>New Note</h2>

<label for="note-title">Title</label>
<input type="text" id="note-title" placeholder="e.g. Meeting notes" />

<label for="note-body">Content</label>
<textarea id="note-body" placeholder="Write anything…"></textarea>

<label for="note-tag">Tag</label>
<input type="text" id="note-tag" placeholder="work, personal, idea…" />

<div class="btn-row">
<button class="btn btn-primary" onclick="addNote()">＋ Add Note</button>
<button class="btn btn-ghost" onclick="clearForm()">Clear</button>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h2>Quick Calculator</h2>

<label for="calc-input">Expression</label>
<input type="text" id="calc-input" placeholder="e.g. 2 + 2 * 10" />

<label for="calc-result">Result</label>
<input type="text" id="calc-result" readonly placeholder="—" />

<div class="btn-row">
<button class="btn btn-primary" onclick="runCalc()">= Evaluate</button>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h2>Quick Link</h2>

<label for="redirect-url">Destination URL</label>
<input type="url" id="redirect-url" placeholder="https://example.com" />

<div class="btn-row">
<button class="btn btn-ghost" onclick="openLink()">→ Go to URL</button>
</div>
</div>
</div>

<div class="panel">
<h2>Saved Notes</h2>
<div id="notes-list">
<div class="empty"><span>📋</span>No notes yet — add one!</div>
</div>

<hr class="divider" />

<h2 style="margin-bottom:12px">Login</h2>

<label for="login-user">Username</label>
<input type="text" id="login-user" placeholder="Enter username" />

<label for="login-pass">Password</label>
<input type="password" id="login-pass" placeholder="••••••••" />

<div id="login-status"></div>

<div class="btn-row">
<button class="btn btn-primary" onclick="doLogin()">Login</button>
<button class="btn btn-danger" onclick="doLogout()">Logout</button>
</div>
</div>

</div>

<div id="toast"></div>

</body>
</html>
